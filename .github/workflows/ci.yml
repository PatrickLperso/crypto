name: Crypto Core CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Récupérer le code du dépôt
    - name: Checkout code
      uses: actions/checkout@v4

    # Installer les dépendances système 
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y binutils make m4 perl flex bison python3 tar bc gcc g++ ca-certificates libbz2-dev bzip2 xz-utils libffi-dev

    # Configurer Python (gère le venv automatiquement)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 
        cache: 'pip' # Cache les dépendances 

    # Installer les dépendances Python & build sagemath
    - name: Install Python dependencies
      env:
        SAGE_CONF_FILE: /dev/null 
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Lancer les tests avec pytest et coverage
    - name: Run tests with pytest
      run: |
        pytest --cov=crypto_core tests/